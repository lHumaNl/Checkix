services:
  # ── FastAPI backend ────────────────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkix_fastapi
    restart: unless-stopped
    env_file:
      - .env
    # Port 8000 only exposed internally (no host mapping)
    expose:
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - checkix_network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkix_migrate
    restart: "no"
    env_file:
      - .env
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - checkix_network

  # ── Nginx: serves frontend + reverse-proxy to FastAPI ──────────────────
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: checkix_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi
    networks:
      - checkix_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx_status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: checkix_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: checkix
      POSTGRES_PASSWORD: checkix
      POSTGRES_DB: checkix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkix"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - checkix_network

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: checkix_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - checkix_network

networks:
  checkix_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
